<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combined Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-title">
        <h1>My Projects</h1>
    </div>

    <div class="card">
        <h2>Digital Clock</h2>
        <div class="clock-box">
            <h1 id="clock">00:00:00</h1>
        </div>
    </div>

    <div class="card">
        <h2>Tip Calculator</h2>
        <div class="input-group">
            <label for="bill">Bill Amount (₹)</label>
            <input type="number" id="bill" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
            <label for="tipPercent">Tip Percentage (%)</label>
            <input type="number" id="tipPercent" placeholder="15" value="15">
        </div>
        <div class="input-group">
            <label for="people">Number of People</label>
            <input type="number" id="people" placeholder="1" value="1" min="1">
        </div>
        <button id="tipCalcBtn">Calculate</button>
        <div id="tipResults" class="hidden">
            <p>Tip Amount: <span id="tipAmount">₹0.00</span></p>
            <p>Total Bill: <span id="totalBill">₹0.00</span></p>
            <p>Each Person Pays: <span id="eachPays">₹0.00</span></p>
        </div>
    </div>

    <div class="card">
        <h2>BMI Calculator</h2>
        <div class="input-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="e.g. 70" min="1" step="0.1">
        </div>
        <div class="input-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" placeholder="e.g. 175" min="1" step="0.1">
        </div>
        <button id="bmiCalcBtn">Calculate BMI</button>
        <div id="bmiResult" class="hidden">
            <p id="bmiValue"></p>
            <p id="bmiCategory"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
